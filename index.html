<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte Linguistiche</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f0ea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .english {
      font-size: 24px;
      font-weight: bold;
    }

    .info-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: blue;
      color: white;
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .italiano, .info {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #eee;
      border-radius: 10px;
    }

    .next {
      background: orange;
      color: white;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="card">

    <div class="header">
      <div class="english" id="en"></div>
      <button class="info-btn" onclick="toggleInfo()">i</button>
    </div>

    <img id="img">

    <button onclick="toggleItalian()">Mostra italiano</button>

    <div class="italiano" id="it"></div>
    <div class="info" id="info"></div>

    <button class="next" onclick="nextCard()">Prossima carta</button>

  </div>
</div>

<script>

const cards = [
  {
    en: "I'm stuffed",
    it: "Sono pieno",
    info: "Può significare 'imbottito', ma si usa soprattutto per il cibo.",
    img: "stuffed.png.png"
  },
  {
    en: "I screwed up",
    it: "Ho fatto un casino",
    info: "Deriva da 'avvitare', ma indica un errore o disastro.",
    img: "screwed-up.png.png"
  },
  {
    en: "That's not my thing",
    it: "Non fa per me",
    info: "Letteralmente 'non è la mia cosa', simile a 'non è la mia tazza di tè'.",
    img: "not-my-thing.png.png"
  }
];

let index = 0;

function render() {
  document.getElementById("en").innerText = cards[index].en;
  document.getElementById("it").innerText = cards[index].it;
  document.getElementById("info").innerText = cards[index].info;
  document.getElementById("img").src = cards[index].img;

  document.getElementById("it").style.display = "none";
  document.getElementById("info").style.display = "none";
}

function toggleItalian() {
  let el = document.getElementById("it");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function toggleInfo() {
  let el = document.getElementById("info");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function nextCard() {
  index = (index + 1) % cards.length;
  render();
}

render();

</script>

</body>
</html>
