<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Linguistiche</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f0ea;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .topbar {
      text-align: center;
      margin-bottom: 14px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: #666;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding: 4px 4px 0;
    }

    .english {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .info-btn {
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2d7ff9;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(45,127,249,0.28);
    }

    .image-wrap {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #f6f6f6;
      border: 2px solid #1f1f1f;
    }

    .image-wrap img {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 4;
      object-fit: cover;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #111827;
      color: white;
      flex: 1;
    }

    .btn-secondary {
      background: #ece8df;
      color: #222;
      flex: 1;
    }

    .panel {
      margin-top: 12px;
      border-radius: 16px;
      padding: 14px;
      background: #f7f4ee;
      border: 1px solid #e6dfd2;
      display: none;
    }

    .panel.show { display: block; }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .panel p {
      margin: 0;
      line-height: 1.45;
      font-size: 15px;
    }

    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .counter {
      font-size: 14px;
      color: #666;
    }

    .next-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #f59e0b;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 420px) {
      .english { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Carte linguistiche</h1>
      <p>Tocca per scoprire traduzione e nota didattica</p>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="english" id="englishText"></div>
        <button class="info-btn" id="infoBtn" aria-label="Mostra spiegazione">i</button>
      </div>

      <div class="image-wrap">
        <img id="cardImage" src="" alt="Carta linguistica" />
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="translationBtn">Mostra italiano</button>
      </div>

      <div class="panel" id="translationPanel">
        <h3>Italiano</h3>
        <p id="italianText"></p>
      </div>

      <div class="panel" id="infoPanel">
        <h3>Nota didattica</h3>
        <p id="infoText"></p>
      </div>

      <div class="footer">
        <div class="counter" id="counterText"></div>
        <button class="next-btn" id="nextBtn">Prossima carta</button>
      </div>
    </div>
  </div>

  <script>
    const cards = [
      {
        en: "I'm stuffed",
        it: "Sono pieno",
        info: "Può significare ‘imbottito’, ma nella lingua parlata si usa soprattutto per il cibo.",
        img: "https://chat.openai.com/c/container/file_000000000788720ba44c4649ce1d8ffe"
      },
      {
        en: "I screwed up",
        it: "Ho fatto un casino",
        info: "Deriva da ‘avvitare’, ma si usa per dire che hai combinato un disastro.",
        img: "https://chat.openai.com/c/container/file_00000000e454720bb6f1f26b4273e0a9"
      },
      {
        en: "That's not my thing",
        it: "Non fa per me",
        info: "Letteralmente significa ‘non è la mia cosa’, simile all’idea di ‘non è la mia tazza di tè’.",
        img: "https://chat.openai.com/c/container/file_00000000aad4720b93a6d080e33b2184"
      }
    ];

    let currentIndex = 0;

    const englishText = document.getElementById('englishText');
    const italianText = document.getElementById('italianText');
    const infoText = document.getElementById('infoText');
    const cardImage = document.getElementById('cardImage');
    const translationPanel = document.getElementById('translationPanel');
    const infoPanel = document.getElementById('infoPanel');
    const translationBtn = document.getElementById('translationBtn');
    const infoBtn = document.getElementById('infoBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counterText = document.getElementById('counterText');

    function renderCard() {
      const card = cards[currentIndex];
      englishText.textContent = card.en;
      italianText.textContent = card.it;
      infoText.textContent = card.info;
      cardImage.src = card.img;
      cardImage.alt = card.en;
      translationPanel.classList.remove('show');
      infoPanel.classList.remove('show');
      translationBtn.textContent = 'Mostra italiano';
      counterText.textContent = `Carta ${currentIndex + 1} di ${cards.length}`;
    }

    translationBtn.addEventListener('click', () => {
      const isOpen = translationPanel.classList.toggle('show');
      translationBtn.textContent = isOpen ? 'Nascondi italiano' : 'Mostra italiano';
    });

    infoBtn.addEventListener('click', () => {
      infoPanel.classList.toggle('show');
    });

    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % cards.length;
      renderCard();
    });

    renderCard();
  </script>
</body>
</html>
